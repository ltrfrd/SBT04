# ===========================================================
# alembic.ini - FleetOS Migration Configuration
# ===========================================================

# ===========================================================
# Alembic Core Settings
# ===========================================================

[alembic]

# Folder containing migration scripts
script_location = alembic

# Migration file naming pattern
file_template = %%(rev)s_%%(slug)s

# Folder storing revision files
version_locations = alembic/versions

# Add project root to sys.path
prepend_sys_path = .

# Development database connection
sqlalchemy.url = sqlite:///fleetos.db


# ===========================================================
# Logging Configuration
# ===========================================================

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic


# -----------------------------------------------------------
# Root Logger
# -----------------------------------------------------------
[logger_root]
level = WARN
handlers = console
qualname =


# -----------------------------------------------------------
# SQLAlchemy Logger
# -----------------------------------------------------------
[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
propagate = 0


# -----------------------------------------------------------
# Alembic Logger
# -----------------------------------------------------------
[logger_alembic]
level = INFO
handlers = console
qualname = alembic
propagate = 0


# -----------------------------------------------------------
# Console Handler
# -----------------------------------------------------------
[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic


# -----------------------------------------------------------
# Log Format
# -----------------------------------------------------------
[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %Y-%m-%d %H:%M:%S
