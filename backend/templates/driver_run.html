<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Driver Run — {{ driver_name }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    body { background: #f8f9fa; min-height: 100vh; }
    .container { max-width: 900px; margin-top: 1rem; }
    .card { border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .status-badge { font-size: 1rem; padding: 0.5rem 1rem; border-radius: 50px; }
    #map { height: 400px; border-radius: 12px; margin: 1rem 0; }
    .progress { height: 24px; border-radius: 12px; }
    .progress-bar { font-weight: bold; }
    .toast { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; min-width: 300px; }
    .btn-action { padding: 0.75rem; font-size: 1.1rem; border-radius: 50px; width: 100%; }
  </style>
</head>
<body>
  <div class="container">
    <div class="card p-4">
      <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="mb-0 text-primary"><i class="bi bi-person-circle"></i> {{ driver_name }}</h2>
        <span class="badge status-badge {% if run_status == 'active' %}bg-success{% else %}bg-warning text-dark{% endif %}">
          {{ run_status|title }}
        </span>
      </div>

      {% if run_status == 'active' %}
      <div id="map"></div>

      <div class="alert alert-info p-3 mb-3">
        <div class="row text-center">
          <div class="col-6">
            <strong>Current:</strong><br>
            <span id="current-stop" class="fs-5">Loading...</span>
          </div>
          <div class="col-6">
            <strong>Next:</strong><br>
            <span id="next-stop" class="fs-5">—</span>
          </div>
        </div>
        <hr>
        <div class="text-center">
          <strong>ETA to Next Stop:</strong><br>
          <span id="eta" class="fs-4 text-primary">Calculating...</span>
        </div>
        <div class="progress mt-3">
          <div id="progress-bar" class="progress-bar bg-success" style="width: 0%">0%</div>
        </div>
      </div>

      <form method="post" action="/runs/end" class="mb-3">
        <input type="hidden" name="run_id" value="{{ run.id }}">
        <button type="submit" class="btn btn-danger btn-action">
          <i class="bi bi-stop-circle"></i> End Run
        </button>
      </form>

      <div id="alert-container"></div>

      {% else %}
      <form method="post" action="/runs/start" class="mb-3">
        <input type="hidden" name="driver_id" value="{{ driver_id }}">
        <div class="mb-3">
          <label class="form-label">Select Route</label>
          <select name="route_id" class="form-select" required>
            <option value="">-- Choose Route --</option>
            {% for route in available_routes %}
            <option value="{{ route.id }}">{{ route.unit_number }} ({{ route.schools|length }} schools)</option>
            {% endfor %}
          </select>
        </div>
        <div class="mb-3">
          <label class="form-label">Run Type</label>
          <select name="run_type" class="form-select" required>
            <option value="AM">AM Run</option>
            <option value="MIDDAY">Midday</option>
            <option value="PM">PM Run</option>
            <option value="EXTRA">Extra/Charter</option>
          </select>
        </div>
        <button type="submit" class="btn btn-success btn-action">
          <i class="bi bi-play-circle"></i> Start Run
        </button>
      </form>
      {% endif %}

      <div class="text-center">
        <a href="/dashboard" class="btn btn-secondary">
          <i class="bi bi-arrow-left"></i> Back to Dashboard
        </a>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    let map, marker, ws;
    const isActiveRun = "{{ run_status }}" === "active";   // Active run flag from template
    const runId = Number("{{ run.id if run else '' }}") || null;   // Active run ID or null
    function initMap(lat = 40.7128, lng = -74.0060) {
      map = L.map('map').setView([lat, lng], 15);
      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
      }).addTo(map);
      marker = L.marker([lat, lng]).addTo(map)
        .bindPopup("Bus Location").openPopup();
    }

    function updateUI(data) {
      const { lat, lng, progress } = data;
      marker.setLatLng([lat, lng]);
      map.setView([lat, lng], 15);

      document.getElementById("current-stop").textContent = progress.current_stop.name;
      document.getElementById("next-stop").textContent = progress.next_stop?.name || "End";

      const percent = progress.progress_percent;
      const bar = document.getElementById("progress-bar");
      bar.style.width = percent + "%";
      bar.textContent = Math.round(percent) + "%";

      const eta = data.progress?.eta || "Calculating...";
      document.getElementById("eta").textContent = eta;
    }

    function showAlert(message) {
      const container = document.getElementById("alert-container");
      const toast = document.createElement("div");
      toast.className = "toast align-items-center text-bg-primary border-0";
      toast.innerHTML = `
        <div class="d-flex">
          <div class="toast-body text-white">
            <i class="bi bi-bell"></i> ${message}
          </div>
          <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
      `;
      container.appendChild(toast);
      new bootstrap.Toast(toast, { delay: 5000 }).show();
    }

    if (isActiveRun) {
      document.addEventListener("DOMContentLoaded", () => {
        initMap();

        ws = new WebSocket(`ws://${window.location.host}/ws/gps/${runId}`);

        ws.onmessage = (event) => {
          const data = JSON.parse(event.data);
          if (data.run_id == runId) {
            updateUI(data);
            if (data.alerts) {
              data.alerts.forEach(alert => {
                showAlert(`${alert.message} (${alert.distance_meters}m)`);
              });
            }
          }
        };

        setInterval(() => {
          if (navigator.geolocation) {
            navigator.geolocation.getCurrentPosition(pos => {
              ws.send(JSON.stringify({
                lat: pos.coords.latitude,
                lng: pos.coords.longitude
              }));
            });
          }
        }, 3000);
      });
    }
  </script>
</body>
</html>
